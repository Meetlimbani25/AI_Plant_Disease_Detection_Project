<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Disease Detection</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .upload-area:hover {
            border-color: #667eea;
            background-color: #f8f9ff;
        }
        .upload-area.dragover {
            border-color: #667eea;
            background-color: #f0f2ff;
        }
        #imageInput {
            display: none;
        }
        #preview {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
        .result.success {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .result.error {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .prediction {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .confidence {
            font-size: 18px;
            margin-bottom: 20px;
        }
        .top-predictions {
            margin-top: 20px;
        }
        .top-predictions h3 {
            margin-bottom: 10px;
            color: #333;
        }
        .suggestion {
            margin-top: 20px;
            padding: 18px;
            border-radius: 10px;
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
        }
        .suggestion h3 {
            margin-top: 0;
            margin-bottom: 10px;
        }
        .prediction-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .stat {
            text-align: center;
        }
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 Plant Disease Detection</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="modelStatus">Checking...</div>
                <div class="stat-label">Model Status</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="classesCount">-</div>
                <div class="stat-label">Disease Classes</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="apiStatus">Checking...</div>
                <div class="stat-label">API Status</div>
            </div>
        </div>

        <div class="upload-area" id="uploadArea">
            <div>
                <h3>📸 Upload Plant Leaf Image</h3>
                <p>Click here or drag & drop an image of a plant leaf</p>
                <p><small>Supported formats: JPG, PNG, JPEG, BMP, TIFF</small></p>
                <input type="file" id="imageInput" accept="image/*">
            </div>
        </div>

        <img id="preview" alt="Preview">

        <div style="text-align: center;">
            <button class="btn" id="predictBtn" disabled>🔍 Analyze Disease</button>
            <button class="btn" id="clearBtn" disabled>🗑️ Clear</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing image...</p>
        </div>

        <div class="result" id="result"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const predictBtn = document.getElementById('predictBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const modelStatus = document.getElementById('modelStatus');
        const classesCount = document.getElementById('classesCount');
        const apiStatus = document.getElementById('apiStatus');

        let selectedFile = null;

        // Check API health on load
        async function checkHealth() {
            try {
                const response = await fetch('/health');
                const data = await response.json();

                if (data.status === 'healthy') {
                    apiStatus.textContent = '✅ Online';
                    apiStatus.style.color = '#28a745';
                    modelStatus.textContent = data.model_loaded ? '✅ Loaded' : '❌ Failed';
                    modelStatus.style.color = data.model_loaded ? '#28a745' : '#dc3545';
                    classesCount.textContent = data.classes_count;
                } else {
                    apiStatus.textContent = '❌ Offline';
                    apiStatus.style.color = '#dc3545';
                }
            } catch (error) {
                apiStatus.textContent = '❌ Offline';
                apiStatus.style.color = '#dc3545';
                modelStatus.textContent = '❌ Failed';
                modelStatus.style.color = '#dc3545';
            }
        }

        // Upload area click
        uploadArea.addEventListener('click', () => {
            imageInput.click();
        });

        // File input change
        imageInput.addEventListener('change', handleFileSelect);

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) {
                handleFile(file);
            }
        }

        function handleFile(file) {
            // Validate file type
            const validTypes = ['image/jpeg', 'image/jpg', 'image/png', 'image/bmp', 'image/tiff'];
            if (!validTypes.includes(file.type)) {
                showResult('Please select a valid image file (JPG, PNG, BMP, TIFF)', 'error');
                return;
            }

            // Validate file size (max 10MB)
            if (file.size > 10 * 1024 * 1024) {
                showResult('File size too large. Please select an image under 10MB.', 'error');
                return;
            }

            selectedFile = file;

            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);

            // Enable buttons
            predictBtn.disabled = false;
            clearBtn.disabled = false;

            // Hide any previous results
            result.style.display = 'none';
        }

        // Predict button
        predictBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            loading.style.display = 'block';
            predictBtn.disabled = true;
            result.style.display = 'none';

            try {
                const formData = new FormData();
                formData.append('image', selectedFile);

                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    showPrediction(data);
                } else {
                    showResult(data.error || 'Prediction failed', 'error');
                }
            } catch (error) {
                showResult('Network error. Please check if the API is running.', 'error');
            } finally {
                loading.style.display = 'none';
                predictBtn.disabled = false;
            }
        });

        // Clear button
        clearBtn.addEventListener('click', () => {
            selectedFile = null;
            imageInput.value = '';
            preview.style.display = 'none';
            predictBtn.disabled = true;
            clearBtn.disabled = true;
            result.style.display = 'none';
            loading.style.display = 'none';
        });

        function showPrediction(data) {
            const confidencePercent = (data.confidence * 100).toFixed(2);
            const diseaseName = data.prediction.replace(/_/g, ' ').replace('___', ' - ');

            let html = `
                <div class="prediction">🎯 ${diseaseName}</div>
                <div class="confidence">Confidence: ${confidencePercent}%</div>
                <div class="confidence">Status: ${data.disease_status}</div>
                <div class="confidence">Detected disease: ${data.disease_name}</div>
                <div class="suggestion">
                    <h3>💡 Suggested Action</h3>
                    <p>${data.suggestion}</p>
                </div>
                <div class="top-predictions">
                    <h3>🏆 Top 3 Predictions:</h3>
            `;

            data.top_3_predictions.forEach((pred, index) => {
                const predName = pred.class.replace(/_/g, ' ').replace('___', ' - ');
                const predConfidence = (pred.confidence * 100).toFixed(2);
                const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : '🥉';

                html += `
                    <div class="prediction-item">
                        <span>${medal} ${predName}</span>
                        <span>${predConfidence}%</span>
                    </div>
                `;
            });

            html += '</div>';

            result.innerHTML = html;
            result.className = 'result success';
            result.style.display = 'block';
        }

        function showResult(message, type) {
            result.innerHTML = `<p>${message}</p>`;
            result.className = `result ${type}`;
            result.style.display = 'block';
        }

        // Initialize
        checkHealth();
    </script>
</body>
</html>
